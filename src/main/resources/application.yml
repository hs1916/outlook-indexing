server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: jdbc:sqlite:${DB_PATH:./pst-search.db}
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
      connection-init-sql: "PRAGMA journal_mode=WAL; PRAGMA synchronous=NORMAL; PRAGMA foreign_keys=ON;"
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  mvc:
    async:
      request-timeout: -1

logging:
  level:
    com.pstsearch: INFO
    org.hibernate.SQL: WARN
